version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: emet-postgres
    environment:
      POSTGRES_DB: emet
      POSTGRES_USER: emet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emet_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emet"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - emet

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: emet-pgbouncer
    environment:
      DATABASE_URL: postgres://emet:${POSTGRES_PASSWORD:-emet_dev}@postgres:5432/emet
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - emet

  redis:
    image: redis:7-alpine
    container_name: emet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - emet

  chromadb:
    image: chromadb/chroma:latest
    container_name: emet-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    networks:
      - emet

volumes:
  postgres_data:
  redis_data:
  chromadb_data:

networks:
  emet:
    driver: bridge
