# EMET Data Source Definitions

[[source]]
name = "Reuters Top News"
type = "rss"
url = "https://feeds.reuters.com/reuters/topNews"
poll_interval_seconds = 300
domains = ["geopolitical"]

[[source]]
name = "GDELT"
type = "api"
url = "https://api.gdeltproject.org/api/v2/doc/doc"
poll_interval_seconds = 600
domains = ["geopolitical", "social"]

[[source]]
name = "ACLED"
type = "api"
url = "https://api.acleddata.com/acled/read"
poll_interval_seconds = 3600
domains = ["military", "geopolitical"]

[[source]]
name = "USGS Earthquakes"
type = "api"
url = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/significant_hour.geojson"
poll_interval_seconds = 300
domains = ["environmental"]

[[source]]
name = "NASA FIRMS"
type = "api"
url = "https://firms.modaps.eosdis.nasa.gov/api/area"
poll_interval_seconds = 600
domains = ["environmental", "military"]

[[source]]
name = "NASA EONET"
type = "api"
url = "https://eonet.gsfc.nasa.gov/api/v3/events"
poll_interval_seconds = 900
domains = ["environmental"]

[[source]]
name = "GCP Dot"
type = "api"
url = "https://gcpdot.com"
poll_interval_seconds = 60
domains = ["consciousness"]

# Additional sources to be added during build phase
